<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FIFA World Cup 2026 - Álbum de Figurinhas Oficial</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Goldman:wght@400;700&family=Montserrat:wght@300;600;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --fifa-burgundy: #6F1A2E;
            --fifa-burgundy-light: #9E2A3E;
            --fifa-gold: #E5B83C;
            --fifa-gold-dark: #C49A2A;
            --fifa-dark: #0F0C12;
            --fifa-card-bg: #1E1926;
            --fifa-text-light: #F5EAD6;
            --color-legendary: #FFD966;
            --color-rare: #B0C4DE;
            --color-epic: #C084FC;
            --color-common: #6EE7B7;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at 10% 20%, #120B14 0%, #0A070C 100%);
            color: var(--fifa-text-light);
            margin: 0;
            overflow-x: hidden;
        }

        header {
            background: linear-gradient(135deg, rgba(111, 26, 46, 0.95) 0%, rgba(30, 25, 38, 0.98) 100%);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid var(--fifa-gold);
            position: relative;
            backdrop-filter: blur(2px);
        }

        .main-title {
            font-family: 'Goldman', cursive;
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            background: linear-gradient(135deg, #FFF3CF, var(--fifa-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(229, 184, 60, 0.4);
            letter-spacing: 2px;
        }

        .dashboard {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: -30px;
            padding: 0 20px;
            flex-wrap: wrap;
            position: relative;
            z-index: 10;
        }

        .stat-box {
            background: rgba(15, 12, 18, 0.85);
            backdrop-filter: blur(12px);
            padding: 15px 30px;
            border-radius: 28px;
            border: 1px solid rgba(229, 184, 60, 0.4);
            text-align: center;
            min-width: 130px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s;
        }

        .stat-box:hover {
            transform: translateY(-5px);
            border-color: var(--fifa-gold);
        }

        .stat-box span {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--fifa-gold);
            font-weight: 800;
            letter-spacing: 2px;
        }

        .stat-box div {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 5px;
            font-family: 'Goldman', monospace;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 40px 0 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            transition: all 0.3s ease;
            font-family: 'Goldman', monospace;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }

        .btn-filter {
            background: rgba(30, 25, 38, 0.9);
            color: var(--fifa-text-light);
            border: 1px solid rgba(229, 184, 60, 0.3);
        }

        .btn-filter:hover,
        .btn-filter.active {
            background: var(--fifa-gold);
            color: #1a1423;
            border-color: var(--fifa-gold);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(229, 184, 60, 0.4);
        }

        .btn-buy {
            background: linear-gradient(135deg, var(--fifa-burgundy), #4A0E1F);
            color: white;
            box-shadow: 0 4px 15px rgba(111, 26, 46, 0.6);
            border: 1px solid rgba(229, 184, 60, 0.5);
        }

        .btn-buy:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(111, 26, 46, 0.8);
            background: linear-gradient(135deg, #8B2A3E, #5E1428);
        }

        .album-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
            gap: 30px;
            padding: 25px;
        }

        .card-wrapper {
            perspective: 1500px;
            height: 340px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            border-radius: 18px;
        }

        .card-wrapper.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.5);
        }

        .card-front {
            background: linear-gradient(145deg, #2A2235 0%, #1C1727 100%);
            transform: rotateY(0deg);
            position: relative;
            border: 2px solid;
            transition: all 0.2s;
        }

        .card-wrapper:hover .card-front {
            filter: brightness(1.02);
            transform: scale(1.01);
        }

        /* Raridade bordas */
        .legendary .card-front {
            border-color: var(--color-legendary);
            box-shadow: 0 0 18px rgba(255, 217, 102, 0.5);
        }

        .rare .card-front {
            border-color: var(--color-rare);
            box-shadow: 0 0 12px rgba(176, 196, 222, 0.4);
        }

        .epic .card-front {
            border-color: var(--color-epic);
            box-shadow: 0 0 15px rgba(192, 132, 252, 0.5);
        }

        .common .card-front {
            border-color: var(--color-common);
            box-shadow: 0 0 10px rgba(110, 231, 183, 0.3);
        }

        .player-image {
            width: 100%;
            height: 60%;
            position: relative;
            background: radial-gradient(circle at 30% 20%, #1A1525, #0B0812);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .player-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .card-wrapper:hover .player-image img {
            transform: scale(1.02);
        }

        .player-number {
            position: absolute;
            top: 10px;
            left: 12px;
            background: rgba(0, 0, 0, 0.7);
            color: var(--fifa-gold);
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 2;
            font-family: monospace;
            backdrop-filter: blur(4px);
        }

        .rarity-icon {
            position: absolute;
            bottom: 10px;
            right: 12px;
            font-size: 1.4rem;
            z-index: 2;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .position-badge {
            position: absolute;
            bottom: 10px;
            left: 12px;
            background: rgba(229, 184, 60, 0.9);
            color: #1A1423;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            letter-spacing: 1px;
            z-index: 2;
            font-family: monospace;
        }

        .player-info {
            padding: 12px;
            text-align: center;
            background: rgba(34, 28, 44, 0.95);
            height: 40%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-top: 1px solid rgba(229, 184, 60, 0.3);
        }

        .player-name {
            font-weight: 800;
            font-size: 1rem;
            color: #FFEFC0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .player-team {
            font-size: 0.7rem;
            color: #C9B6E4;
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .player-team img {
            width: 22px;
            height: 15px;
            object-fit: cover;
            border-radius: 3px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .rarity-text {
            font-size: 0.6rem;
            font-weight: bold;
            margin-top: 6px;
        }

        /* Verso da figurinha */
        .card-back {
            background: linear-gradient(135deg, #1C1628, #110D1A);
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            border: 2px solid var(--fifa-gold);
            position: relative;
        }

        .card-back::before {
            content: "★ 2026 ★";
            position: absolute;
            top: 18px;
            font-size: 0.7rem;
            color: var(--fifa-gold);
            letter-spacing: 3px;
            font-weight: bold;
        }

        .card-back-stats {
            margin-top: 35px;
        }

        .rarity-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 0.7rem;
            margin: 8px 0;
        }

        .fake-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
            font-size: 0.7rem;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.08);
            padding: 6px;
            border-radius: 12px;
            font-weight: bold;
        }

        .counter-badge {
            position: absolute;
            top: -10px;
            right: -8px;
            background: var(--fifa-burgundy);
            color: var(--fifa-gold);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            font-weight: bold;
            z-index: 20;
            border: 2px solid var(--fifa-gold);
            box-shadow: 0 2px 12px black;
            font-family: monospace;
        }

        /* Pack Overlay */
        #pack-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 3, 8, 0.98);
            z-index: 10000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(18px);
        }

        .pack-container {
            display: flex;
            gap: 25px;
            perspective: 1000px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            padding: 25px;
        }

        .flying-card {
            animation: flyIn 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
            opacity: 0;
            width: 190px;
            height: 270px;
            position: relative;
        }

        @keyframes flyIn {
            0% {
                opacity: 0;
                transform: scale(0.2) translateY(200px) rotate(20deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0) rotate(0deg);
            }
        }

        @media (max-width: 768px) {
            .album-grid {
                grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
                gap: 18px;
            }
            .card-wrapper {
                height: 290px;
            }
            .player-name {
                font-size: 0.75rem;
            }
        }
    </style>
</head>

<body>

    <div id="pack-overlay">
        <h1 style="font-family: 'Goldman'; color: var(--fifa-gold); text-shadow: 0 0 15px rgba(229,184,60,0.6);">✨ PACOTE FIFA 2026 ✨</h1>
        <div class="pack-container" id="pack-result-area"></div>
        <button class="btn btn-buy" id="btn-collect" style="margin-top: 35px; padding: 12px 40px;" onclick="closePack()">📥 COLECIONAR</button>
    </div>

    <header>
        <h1 class="main-title">FIFA WORLD CUP 2026™</h1>
        <p style="color: #E5B83C; letter-spacing: 2px;">⭐ ÁLBUM DIGITAL OFICIAL ⭐</p>
    </header>

    <div class="dashboard">
        <div class="stat-box"><span>🪙 MOEDAS FIFA</span>
            <div id="coin-val">1000</div>
        </div>
        <div class="stat-box"><span>📋 COLETADAS</span>
            <div id="prog-val">0 / 120</div>
        </div>
        <div class="stat-box"><span>🔄 REPETIDAS</span>
            <div id="rep-val">0</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-filter active" onclick="setFilter('all', this)">📚 TODAS</button>
        <button class="btn btn-filter" onclick="setFilter('owned', this)">✅ MINHAS</button>
        <button class="btn btn-filter" onclick="setFilter('missing', this)">❌ FALTANDO</button>
        <button class="btn btn-buy" onclick="openPack()">🎁 ABRIR PACOTE (100 🪙)</button>
        <button class="btn btn-filter" onclick="addCoins()">💰 + MOEDAS</button>
    </div>

    <div class="album-grid" id="album-grid"></div>

   <script>
    const TOTAL_CARDS = 120;
    
    // ---------- BASE DE DADOS COMPLETA COM NOME, SELEÇÃO (código bandeira) e POSIÇÃO ----------
    // Lista de 120 jogadores reais/semireais para dar vida ao álbum
    const PLAYERS_FULL = [
        { n: "Lionel Messi", t: "ar", p: "ATA" }, { n: "Cristiano Ronaldo", t: "pt", p: "ATA" }, { n: "Vinícius Jr.", t: "br", p: "ATA" },
        { n: "Kylian Mbappé", t: "fr", p: "ATA" }, { n: "Erling Haaland", t: "no", p: "ATA" }, { n: "Jude Bellingham", t: "gb-eng", p: "MEI" },
        { n: "Neymar Jr.", t: "br", p: "ATA" }, { n: "Kevin De Bruyne", t: "be", p: "MEI" }, { n: "Lamine Yamal", t: "es", p: "ATA" },

        { n: "Thibaut Courtois", t: "be", p: "GOL" }, { n: "Mike Maignan", t: "fr", p: "GOL" }, { n: "Ederson", t: "br", p: "GOL" },
        { n: "Declan Rice", t: "gb-eng", p: "VOL" }, { n: "Pedri", t: "es", p: "MEI" }, { n: "Gavi", t: "es", p: "MEI" },
        { n: "Enzo Fernández", t: "ar", p: "VOL" }, { n: "Alexis Mac Allister", t: "ar", p: "MEI" }, { n: "Darwin Núñez", t: "uy", p: "ATA" },
        { n: "Randal Kolo Muani", t: "fr", p: "ATA" }, { n: "Julian Álvarez", t: "ar", p: "ATA" }, { n: "Khvicha Kvaratskhelia", t: "ge", p: "ATA" },
        { n: "Florian Wirtz", t: "de", p: "MEI" }, { n: "Bukayo Saka", t: "gb-eng", p: "ATA" }, { n: "Martin Ødegaard", t: "no", p: "MEI" },
        { n: "Achraf Hakimi", t: "ma", p: "LAT" }, { n: "Theo Hernández", t: "fr", p: "LAT" }, { n: "João Cancelo", t: "pt", p: "LAT" },
        { n: "Trent Alexander-Arnold", t: "gb-eng", p: "LAT" }, { n: "David Alaba", t: "at", p: "ZAG" }, { n: "Antonio Rüdiger", t: "de", p: "ZAG" },
        { n: "Eder Militão", t: "br", p: "ZAG" }, { n: "Ronald Araújo", t: "uy", p: "ZAG" }, { n: "Marquinhos", t: "br", p: "ZAG" },
        { n: "John Stones", t: "gb-eng", p: "ZAG" }, { n: "Manuel Akanji", t: "ch", p: "ZAG" }, { n: "Kim Min-jae", t: "kr", p: "ZAG" },
        { n: "Dayot Upamecano", t: "fr", p: "ZAG" }, { n: "Nicolò Barella", t: "it", p: "MEI" }, { n: "Frenkie de Jong", t: "nl", p: "MEI" },
        { n: "Bruno Fernandes", t: "pt", p: "MEI" }, { n: "James Rodríguez", t: "co", p: "MEI" }, { n: "Christian Pulisic", t: "us", p: "ATA" },
        { n: "Weston McKennie", t: "us", p: "VOL" }, { n: "Hirving Lozano", t: "mx", p: "ATA" }, { n: "Edson Álvarez", t: "mx", p: "VOL" },
        { n: "Yoshinori Muto", t: "jp", p: "ATA" }, { n: "Takefusa Kubo", t: "jp", p: "MEI" }, { n: "Son Heung-min", t: "kr", p: "ATA" },
        { n: "Lee Kang-in", t: "kr", p: "MEI" }, { n: "Sadio Mané", t: "sn", p: "ATA" }, { n: "Kalidou Koulibaly", t: "sn", p: "ZAG" },
        { n: "André Onana", t: "cm", p: "GOL" }, { n: "Hakim Ziyech", t: "ma", p: "MEI" }, { n: "Yassine Bounou", t: "ma", p: "GOL" },
        { n: "Nayef Aguerd", t: "ma", p: "ZAG" }, { n: "Mason Mount", t: "gb-eng", p: "MEI" }, { n: "Reece James", t: "gb-eng", p: "LAT" },
        { n: "Kai Havertz", t: "de", p: "ATA" }, { n: "Serge Gnabry", t: "de", p: "ATA" }, { n: "Leroy Sané", t: "de", p: "ATA" },
        { n: "Iker Muniain", t: "es", p: "MEI" }, { n: "Dani Olmo", t: "es", p: "MEI" }, { n: "Álvaro Morata", t: "es", p: "ATA" },
        { n: "Fabián Ruiz", t: "es", p: "MEI" }, { n: "Giovanni Lo Celso", t: "ar", p: "MEI" }, { n: "Lautaro Martínez", t: "ar", p: "ATA" },
        { n: "Ángel Di María", t: "ar", p: "ATA" }, { n: "Rodrigo De Paul", t: "ar", p: "VOL" }, { n: "Richarlison", t: "br", p: "ATA" },
        { n: "Raphinha", t: "br", p: "ATA" }, { n: "Lucas Paquetá", t: "br", p: "MEI" }, { n: "Casemiro", t: "br", p: "VOL" },
        { n: "Danilo", t: "br", p: "LAT" }, { n: "Alex Sandro", t: "br", p: "LAT" }, { n: "Gleison Bremer", t: "br", p: "ZAG" },
        { n: "Dominik Szoboszlai", t: "hu", p: "MEI" }, { n: "Miloš Veljković", t: "rs", p: "ZAG" }, { n: "Dusan Vlahović", t: "rs", p: "ATA" },
        { n: "Sergej Milinković-Savić", t: "rs", p: "MEI" }, { n: "Patrik Schick", t: "cz", p: "ATA" }, { n: "Tomáš Souček", t: "cz", p: "VOL" },
        { n: "Georginio Wijnaldum", t: "nl", p: "MEI" }, { n: "Matthijs de Ligt", t: "nl", p: "ZAG" }, { n: "Denzel Dumfries", t: "nl", p: "LAT" },
        { n: "Cody Gakpo", t: "nl", p: "ATA" }, { n: "Xavi Simons", t: "nl", p: "MEI" }, { n: "Jeremie Frimpong", t: "nl", p: "LAT" },
        { n: "Jonathan David", t: "ca", p: "ATA" }, { n: "Alphonso Davies", t: "ca", p: "LAT" }, { n: "Stephen Eustáquio", t: "ca", p: "VOL" },
        { n: "Milan Borjan", t: "ca", p: "GOL" }, { n: "Luis Díaz", t: "co", p: "ATA" }, { n: "Duván Zapata", t: "co", p: "ATA" }
    ];
    
    // garantir 120 itens (completar com genéricos se faltar)
    while(PLAYERS_FULL.length < TOTAL_CARDS) {
        PLAYERS_FULL.push({ n: `Craque ${PLAYERS_FULL.length+1}`, t: "br", p: "ATA" });
    }
    if(PLAYERS_FULL.length > TOTAL_CARDS) PLAYERS_FULL.length = TOTAL_CARDS;

    let userState = { inventory: {}, coins: 1000, filter: 'all' };
    const database = [];

    function createDatabase() {
        for (let i = 1; i <= TOTAL_CARDS; i++) {
            let rarity = i <= 8 ? "legendary" : i <= 28 ? "rare" : i <= 70 ? "epic" : "common";
            const pData = PLAYERS_FULL[i-1];
            database.push({
                id: i,
                name: pData.n,
                countryCode: pData.t,
                pos: pData.p,
                rarity: rarity,
                flagUrl: `https://flagcdn.com/w320/${pData.t}.png`
            });
        }
    }

    function getRarityInfo(rarity) {
        switch (rarity) {
            case 'legendary': return { color: '#FFD966', label: 'LENDÁRIA', icon: '🏆' };
            case 'rare': return { color: '#A5D8FF', label: 'RARA', icon: '💎' };
            case 'epic': return { color: '#D8B4FE', label: 'ÉPICA', icon: '⚡' };
            default: return { color: '#6EE7B7', label: 'COMUM', icon: '⭐' };
        }
    }

    function updateStats() {
        let ownedCount = 0;
        let duplicates = 0;
        for (let i = 1; i <= TOTAL_CARDS; i++) {
            let qty = userState.inventory[i] || 0;
            if (qty > 0) ownedCount++;
            if (qty > 1) duplicates += (qty - 1);
        }
        document.getElementById('prog-val').innerText = `${ownedCount} / ${TOTAL_CARDS}`;
        document.getElementById('rep-val').innerText = duplicates;
        document.getElementById('coin-val').innerText = userState.coins;
    }

    function render() {
        const grid = document.getElementById('album-grid');
        grid.innerHTML = '';

        database.forEach(p => {
            const count = userState.inventory[p.id] || 0;
            const isOwned = count > 0;
            if (userState.filter === 'owned' && !isOwned) return;
            if (userState.filter === 'missing' && isOwned) return;

            const info = getRarityInfo(p.rarity);
            const wrap = document.createElement('div');
            wrap.className = `card-wrapper ${p.rarity}`;
            wrap.onclick = (function(cardId) { 
                return function() { this.classList.toggle('flipped'); };
            })(p.id);

            // front e back com todos os detalhes: bandeira, posição, nome
            wrap.innerHTML = `
                <div class="card-inner">
                    ${count > 1 ? `<div class="counter-badge">x${count}</div>` : ''}
                    <div class="card-front">
                        ${isOwned ? `
                            <div class="player-image">
                                <img src="${p.flagUrl}" alt="bandeira" loading="lazy" onerror="this.src='https://flagcdn.com/w320/un.png'">
                                <div class="player-number">#${String(p.id).padStart(3,'0')}</div>
                                <div class="rarity-icon">${info.icon}</div>
                                <div class="position-badge">${p.pos}</div>
                            </div>
                            <div class="player-info">
                                <div class="player-name">${p.name.toUpperCase()}</div>
                                <div class="player-team">
                                    <img src="${p.flagUrl}" style="width:20px; height:14px;" onerror="this.style.display='none'">
                                    <span>${p.countryCode.toUpperCase()}</span>
                                </div>
                                <div class="rarity-text" style="color:${info.color}">${info.label}</div>
                            </div>
                        ` : `
                            <div class="player-image" style="background: #120E1A; display:flex; align-items:center; justify-content:center; flex-direction:column;">
                                <span style="font-size:2.5rem;">❓</span>
                                <div class="player-number">#${String(p.id).padStart(3,'0')}</div>
                                <div class="position-badge" style="background:#5A4A6E;">???</div>
                            </div>
                            <div class="player-info" style="background:#241F2E;">
                                <div class="player-name" style="color:#7A6A8E;">FIGURINHA OCULTA</div>
                                <div class="player-team"><span>🔒 ABRA PACOTES</span></div>
                            </div>
                        `}
                    </div>
                    <div class="card-back">
                        <div style="font-size: 1rem; font-weight:bold; color: var(--fifa-gold);">${p.name.toUpperCase()}</div>
                        <div style="font-size: 0.75rem; margin: 8px 0;">${p.pos} | ${p.countryCode.toUpperCase()}</div>
                        <img src="${p.flagUrl}" width="55" style="border-radius: 8px; border: 1px solid gold; margin-bottom:8px;" onerror="this.src='https://flagcdn.com/w320/un.png'">
                        <div class="fake-stats">
                            <div class="stat-item">⚽ GOLS: ${Math.floor(Math.random() * 35) + 20}</div>
                            <div class="stat-item">🛡️ DEFESA: ${Math.floor(Math.random() * 40) + 50}</div>
                        </div>
                        <div class="rarity-badge" style="background:${info.color}20; color:${info.color};">${info.label}</div>
                    </div>
                </div>
            `;
            grid.appendChild(wrap);
        });
        updateStats();
    }

    function openPack() {
        if (userState.coins < 100) {
            alert("Moedas insuficientes! Clique em '+ MOEDAS' para testar.");
            return;
        }
        userState.coins -= 100;
        updateStats();
        
        const packCards = [];
        for (let i = 0; i < 5; i++) {
            const randId = Math.floor(Math.random() * TOTAL_CARDS) + 1;
            packCards.push(database.find(c => c.id === randId));
        }
        
        const overlay = document.getElementById('pack-overlay');
        const area = document.getElementById('pack-result-area');
        area.innerHTML = '';
        overlay.style.display = 'flex';
        
        packCards.forEach((card, idx) => {
            const info = getRarityInfo(card.rarity);
            const cardDiv = document.createElement('div');
            cardDiv.className = 'flying-card';
            cardDiv.style.animationDelay = `${idx * 0.1}s`;
            cardDiv.innerHTML = `
                <div style="background: linear-gradient(145deg, #2A2235, #181320); border-radius: 16px; border: 2px solid ${info.color}; height:100%; width:100%; overflow:hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.5);">
                    <div style="height:60%; background:#111; display:flex; align-items:center; justify-content:center;">
                        <img src="${card.flagUrl}" style="width:100%; height:100%; object-fit:cover;" onerror="this.src='https://flagcdn.com/w320/un.png'">
                    </div>
                    <div style="padding:10px; text-align:center;">
                        <div style="font-weight:bold; font-size:0.85rem;">${card.name}</div>
                        <div style="font-size:0.65rem; color:${info.color}">${card.pos} | ${card.countryCode.toUpperCase()}</div>
                    </div>
                </div>
            `;
            area.appendChild(cardDiv);
        });
        
        window._pendingPack = packCards;
    }
    
    function closePack() {
        if (window._pendingPack) {
            for (let card of window._pendingPack) {
                let currentQty = userState.inventory[card.id] || 0;
                userState.inventory[card.id] = currentQty + 1;
            }
            window._pendingPack = null;
            render();
        }
        document.getElementById('pack-overlay').style.display = 'none';
    }
    
    function setFilter(type, btnElement) {
        userState.filter = type;
        document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        render();
    }
    
    function addCoins() {
        userState.coins += 500;
        updateStats();
        render();
    }
    
    createDatabase();
    // Inicializar inventário vazio
    for (let i = 1; i <= TOTAL_CARDS; i++) {
        if (!userState.inventory[i]) userState.inventory[i] = 0;
    }
    render();
    
    window.openPack = openPack;
    window.closePack = closePack;
    window.setFilter = setFilter;
    window.addCoins = addCoins;
    </script>
</body>

</html>
