<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Portfolio | Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --bg-card: #121212;
            --bg-input: #1a1a1a;
            --primary: #9333ea; /* Roxo vibrante */
            --primary-hover: #a855f7;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --danger: #ef4444;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .main-wrapper {
            max-width: 900px;
            margin: 0 auto;
        }

        /* --- HEADER & PERFIL --- */
        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-bottom: 50px;
        }

        .profile-container {
            position: relative;
            margin-bottom: 20px;
        }

        .profile-pic {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            padding: 5px;
            box-shadow: 0 0 30px rgba(147, 51, 234, 0.3);
        }

        .profile-info h1 {
            font-size: 2.5rem;
            letter-spacing: -1px;
            margin-bottom: 5px;
        }

        .profile-info p {
            color: var(--primary);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        /* --- PAINEL DE CONTROLE (ADMIN) --- */
        .admin-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 60px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .admin-card h3 {
            margin-bottom: 20px;
            color: var(--text-dim);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-width { grid-column: span 2; }

        input, select {
            background: var(--bg-input);
            border: 1px solid var(--glass-border);
            padding: 12px 15px;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(147, 51, 234, 0.2);
        }

        .btn-save {
            grid-column: span 2;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn-save:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        /* --- LISTAGEM DE PROJETOS --- */
        .category-group {
            margin-bottom: 40px;
        }

        .category-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-main);
        }

        .category-title span {
            height: 2px;
            background: var(--primary);
            flex-grow: 1;
            opacity: 0.3;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .link-card {
            background: #1a1a1a;
            border: 1px solid var(--glass-border);
            padding: 18px 25px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
        }

        .link-card:hover {
            background: #252525;
            border-color: var(--primary);
            padding-left: 30px;
        }

        .link-content {
            display: flex;
            flex-direction: column;
        }

        .link-name {
            font-weight: 600;
            color: var(--text-main);
            font-size: 1.1rem;
        }

        .link-url {
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .btn-delete:hover {
            background: var(--danger);
            color: white;
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 600px) {
            .admin-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
            .btn-save { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header class="profile-section">
            <div class="profile-container">
                <img src="https://via.placeholder.com/150" alt="Foto de Perfil" class="profile-pic" id="display-pic">
            </div>
            <div class="profile-info">
                <h1 id="display-name">Andrey</h1>
                <p>Developer Portfolio</p>
            </div>
        </header>

        <section class="admin-card">
            <h3>⚙️ Gerenciar Portfólio</h3>
            <div class="admin-grid">
                <input type="text" id="input-name" placeholder="Mudar Nome">
                <input type="text" id="input-pic" placeholder="Link da Foto (URL)">
                
                <input type="text" id="proj-nome" class="full-width" placeholder="Nome do Projeto">
                <input type="text" id="proj-url" class="full-width" placeholder="URL do Link (Ex: https://github.com/...)">
                
                <select id="proj-cat" class="full-width">
                    <option value="html">HTML & CSS</option>
                    <option value="js">JavaScript</option>
                    <option value="python">Python</option>
                    <option value="mobile">Mobile Development</option>
                </select>

                <button class="btn-save" onclick="salvarTudo()">Atualizar e Salvar Projeto</button>
            </div>
        </section>

        <main id="portfolio-list">
            <div class="category-group">
                <div class="category-title">HTML & CSS <span></span></div>
                <div class="projects-grid" id="cat-html"></div>
            </div>

            <div class="category-group">
                <div class="category-title">JavaScript <span></span></div>
                <div class="projects-grid" id="cat-js"></div>
            </div>

            <div class="category-group">
                <div class="category-title">Python <span></span></div>
                <div class="projects-grid" id="cat-python"></div>
            </div>

            <div class="category-group">
                <div class="category-title">Mobile <span></span></div>
                <div class="projects-grid" id="cat-mobile"></div>
            </div>
        </main>
    </div>

    <script>
        // Banco de dados local
        let db = JSON.parse(localStorage.getItem('devPortfolioDB')) || {
            user: { name: "Seu Nome", pic: "https://github.com/identicons/johndoe.png" },
            projects: []
        };

        function atualizarInterface() {
            // Atualiza Perfil

            document.getElementById('display-pic').src = db.user.pic;

            // Limpa Listas
            const categorias = ['html', 'js', 'python', 'mobile'];
            categorias.forEach(cat => document.getElementById(`cat-${cat}`).innerHTML = '');

            // Renderiza Projetos
            db.projects.forEach((proj, index) => {
                const container = document.getElementById(`cat-${proj.categoria}`);
                if (container) {
                    container.innerHTML += `
                        <div class="link-card">
                            <a href="${proj.url}" target="_blank" class="link-content">
                                <span class="link-name">${proj.nome}</span>
                                <span class="link-url">${proj.url.substring(0, 40)}...</span>
                            </a>
                            <button class="btn-delete" onclick="removerProjeto(${index})">Remover</button>
                        </div>
                    `;
                }
            });

            // Salva no Navegador
            localStorage.setItem('devPortfolioDB', JSON.stringify(db));
        }

        function salvarTudo() {
            const novoNome = document.getElementById('input-name').value;
            const novaFoto = document.getElementById('input-pic').value;
            const projNome = document.getElementById('proj-nome').value;
            const projUrl = document.getElementById('proj-url').value;
            const projCat = document.getElementById('proj-cat').value;

            // Atualiza Dados do Usuário se preenchidos
            if(novoNome) db.user.name = novoNome;
            if(novaFoto) db.user.pic = novaFoto;

            // Adiciona Projeto se tiver nome e URL
            if(projNome && projUrl) {
                db.projects.push({
                    nome: projNome,
                    url: projUrl,
                    categoria: projCat
                });
                // Limpa campos de projeto
                document.getElementById('proj-nome').value = '';
                document.getElementById('proj-url').value = '';
            }

            atualizarInterface();
        }

        function removerProjeto(index) {
            if(confirm("Deseja remover este projeto?")) {
                db.projects.splice(index, 1);
                atualizarInterface();
            }
        }

        // Inicialização
        atualizarInterface();
    </script>
</body>
</html>
